<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry | Cognoquill</title>
    <link rel="stylesheet" href="cognoquill.css">
</head>
<body>

<header class="category-header">
    <h1>COGNOQUILL</h1>
    <a href="index.html" class="back-home">← Back Home</a>
</header>

<section class="paper">

    <h2 class="page-title">POETRY</h2>

    <p class="description">
        Every poem begins with a feeling. Share yours or discover beautiful words written by others.
    </p>

    <!-- ===========================
         POETRY CONTENT LAYOUT
         (Two Column: Submit Card + Carousel)
    ============================ -->

    <div class="poetry-layout">

        <!-- LEFT COLUMN: SUBMIT CARD -->
        <div class="submit-column">

            <div class="submit-card">
                <span>+</span>
                <h3>Share Your Work</h3>
                <p>Click to submit your poem and let the world read your words.</p>
            </div>

        </div>

        <!-- RIGHT COLUMN: CAROUSEL -->
        <div class="carousel-column">

            <div class="poem-carousel" id="poemCarousel">

                <div class="carousel-track" id="carouselTrack">
                    <!-- Cards injected here by JS -->
                </div>

            </div>

            <div class="carousel-dots" id="carouselDots">
                <!-- Dots injected here by JS -->
            </div>

        </div>

    </div>

</section>

<!-- ===========================
     SUBMISSION MODAL
=========================== -->
<div class="modal" id="submitModal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Share Your Work</h2>
        <form id="submissionForm">
            <input type="text" placeholder="Title" required>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Email" required>
            <textarea rows="8" placeholder="Write your poem..." required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
</div>

<script src="cognoquill.js"></script>
</body>
</html>
