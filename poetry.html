<!DOCTYPE html>
<html lang="en">
<head>
    <title>Poetry | Cognoquill</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="cognoquill.css">
</head>

<body>

<header class="category-header">

    <h1>POETRY</h1>

</header>

<div class="paper">

    <p class="description">

        Every poem begins with a feeling. Share yours or discover
        beautiful words written by others.

    </p>

    <div class="cards">

        <!-- Add Card -->

       <div class="submit-card">
    <span>+</span>
</div>

        </div>

        <!-- Card -->

        <div class="work-card">

            <h3>No submissions yet</h3>

            <p>Be the first to share.</p>

        </div>

        <!-- Card -->

        <div class="work-card">

            <h3>No submissions yet</h3>

            <p>Be the first to share.</p>

        </div>

    </div>

</div>

    <!-- Submit Modal -->
<div class="modal" id="submitModal">

    <div class="modal-content">

        <span class="close">&times;</span>

        <h2>Share Your Work</h2>

        <form id="submissionForm">

            <input type="text" placeholder="Title" required>

            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Email" required>

            <textarea placeholder="Write here..." rows="8" required></textarea>

            <button type="submit">Submit</button>

        </form>

    </div>

</div>

<script src="cognoquill.js"></script>

</body>
</html>
